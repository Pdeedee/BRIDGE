# ============================================================================
# NEPactive 完整配置文件 - 包含所有参数
# ============================================================================

# ============================================================================
# 1. 项目基本信息
# ============================================================================
project_name: "MyProject"              # 项目名称
yaml_synchro: true                     # 每步重新读取配置文件

# ============================================================================
# 2. 作业提交系统配置（可选）
# ============================================================================
job_system:
  # 作业提交模式: "local" 或 "direct"
  # - local: 使用调度系统提交（sbatch/qsub等）
  # - direct: 直接执行（不使用调度系统）
  mode: "direct"                       # 默认直接执行

  # 调度系统类型: "slurm", "pbs", "torque", "sge"
  scheduler: "slurm"

  # 作业检查间隔（秒）
  check_interval: 30

  # GPU 任务的作业脚本头（用 | 符号写多行字符串）
  gpu_header: |
    #!/bin/bash
    #SBATCH --job-name=nepactive-gpu
    #SBATCH --partition=gpu
    #SBATCH --gres=gpu:1
    #SBATCH --time=24:00:00

    module load cuda/11.8
    conda activate nepactive
    export PATH=/path/to/gpumd/bin:$PATH

  # CPU 任务的作业脚本头
  cpu_header: |
    #!/bin/bash
    #SBATCH --job-name=nepactive-cpu
    #SBATCH --partition=cpu
    #SBATCH --ntasks=4
    #SBATCH --time=12:00:00

    module load python/3.9

# ============================================================================
# 3. NEP 训练基本参数
# ============================================================================
nep_in_header: "type 2 V N"           # NEP 元素类型定义
replicate_cell: "1 1 1"                # 超胞复制（不复制则为 "1 1 1"）
accuracy: 1                            # 收敛精度（爆速误差百分比）

# ============================================================================
# 4. 训练参数
# ============================================================================
ini_frames: 1500                       # 初始数据集结构数
ini_train_steps: 10000                 # 第一代训练步数
training_ratio: 0.8                    # 训练集比例（0.8 = 80%训练，20%验证）
pot_number: 4                          # 势函数个数（用于计算不确定性）
pot_inherit: true                      # 是否继承上一代势函数
train_steps: 5000                      # 后续每代训练步数

# ============================================================================
# 5. 初始数据集生成
# ============================================================================
ini_engine: "ase"                      # 初始数据集生成引擎（目前只支持 ase）
python_interpreter: "python"           # Python 解释器路径

# MatterSim 模型路径（用于初始数据集生成和标注）
pot_file: "/home/user/.local/mattersim/pretrained_models/mattersim-v1.0.0-1M.pth"

# 可选：自定义 ASE 系综脚本
# ini_ase_ensemble_files: ["prep/npt.py"]

# ============================================================================
# 6. 结构文件配置
# ============================================================================
# 结构文件前缀（默认为当前目录）
# structure_prefix: "/path/to/structures"

# 用于动力学模拟的结构文件列表
structure_files:
  - "POSCAR"                           # 初始结构
  - "init/struc.000/structure/POSCAR"  # 自动生成的结构
  # - "prep/final.xyz"                 # 其他额外结构

# 第一性原理计算输入文件（远程计算用）
kpoints_file: "prep/KPOINTS"
incar_file: "prep/INCAR"
potcar_file: "prep/POTCAR"

# ============================================================================
# 7. 主动学习参数
# ============================================================================
# 不确定性阈值 [下限, 上限]
uncertainty_threshold: [0.3, 1]

# 不确定性计算参数
uncertainty_level: 1                   # 不确定性级别
uncertainty_mode: "max"                # 不确定性模式: "max" 或 "mean"

# 能量阈值（eV）- 过滤高能结构
energy_threshold: 1

# 每代需要的结构数
needed_frames: 10000

# 最大候选结构数
max_candidate: 1000

# ============================================================================
# 8. 动力学参数
# ============================================================================
# 第 0 代运行步数
ini_run_steps: 100000

# 动力学时间步长（fs）
model_devi_time_step: 0.2
time_step: 0.2

# 最大运行步数（当步数超过此值且代数>=20时自动停止）
max_run_steps: 1000000

# 最大温度限制（K）
max_temp: 10000

# ============================================================================
# 9. GPU 资源配置
# ============================================================================
gpu_available: [0, 1, 2, 3]            # 可用的 GPU 编号
task_per_gpu: 1                        # 每个 GPU 上运行的任务数

# ============================================================================
# 10. 动力学系综设置
# ============================================================================
model_devi_general:
  - # id: "task-1"                     # 任务标识（可选）
    ensembles: ["nphugo", "nvt"]       # 系综类型列表
    structure_id: [[0, 1], [0, 1]]     # 每个系综使用的结构编号
    pressure: [60, 35, 10]             # 压力列表（GPa）
    pperiod: 2000                      # 压浴周期（步数）
    temperature: [3000]                # 温度列表（K）
    # tperiod: 100                     # 温度浴周期（可选）

# ============================================================================
# 11. 初始结构生成和爆速测试
# ============================================================================
stable:
  # 基本设置
  structure: "POSCAR"                  # 初始结构文件
  dump_freq: 10                        # 输出频率（步数）
  struc_num: 1                         # 生成的初始结构数

  # 初始数据集参数
  pressure: [20, 40, 60, 80]           # 压力列表（GPa）
  temperature: [3000]                  # 温度列表（K）
  steps: 40000                         # 运行步数

  # 爆速测试参数
  gpumd_pressure_list: [20, 25, 30, 35, 40, 45, 50, 55]  # 测试压力列表（GPa）
  gpumd_steps: 600000                  # 测试运行步数
  time_step: 0.2                       # 时间步长（fs）
  analyze_range: [0.5, 1]              # 分析范围（轨迹的后 50%）

  # 可选参数
  # original_make: true                # 是否生成原始结构
  # python_interpreter: "python"       # Python 解释器
  # tfreq: 100                         # 温度浴频率
  # pfreq: 100                         # 压力浴频率

# ============================================================================
# 12. 爆速测试控制
# ============================================================================
shock_test_interval: 1                 # 爆速测试间隔（每 N 代测试一次）
shock_test_begin_step: 400000          # 开始爆速测试的步数阈值
if_stable_run: true                    # 是否运行初始结构生成和爆速测试
shock_run: true                        # 是否启用爆速测试功能

# ============================================================================
# 13. 密度和氧平衡参数
# ============================================================================
# rho: 1.62                            # 单一密度（g/cm³）- 已弃用
rhos: [1.62, 1.65, 1.68, 1.70, 1.72]  # 密度测试列表（g/cm³）
OB_give: 10                            # 氧平衡给定值
OB_gives: [0, 54]                      # 氧平衡测试列表

# ============================================================================
# 14. 远程计算配置（可选）
# ============================================================================
# 如果不使用远程计算，可以注释掉这部分

# VASP 运行命令
fp_command: "mpirun -np 96 vasp_std"

# SSH 连接信息
ssh_username: "user@cluster"
ssh_hostname: "login.cluster.com"
ssh_port: 22
ssh_timeout: 20

# 远程工作目录
remote_root: "/scratch/user/nepactive"

# 任务分组数（将候选结构分成多少组提交）
group_numbers: 10

# SLURM 作业脚本头（用于远程 VASP 计算）
slurm_header_script:
  - "#!/bin/bash"
  - "#SBATCH --job-name=vasp"
  - "#SBATCH -p v6_384"
  - "#SBATCH -N 1"
  - "#SBATCH -n 96"
  - "source /public1/soft/modules/module.sh"
  - "module load mpi/oneAPI/2022.1"
  - "export PATH=/path/to/vasp:$PATH"

# ============================================================================
# 15. 高级参数（一般不需要修改）
# ============================================================================

# 重试信号（用于远程任务重试）
# retry_signal: false

# 结构文件前缀
# structure_prefix: "."

# 工作目录
# work_dir: "."

# 是否使用 GPU 进行 NEP 训练
# use_gpu: true

# NEP 可执行文件路径
# nep_executable: "nep"

# GPUMD 可执行文件路径
# gpumd_executable: "gpumd"

# ============================================================================
# 参数说明
# ============================================================================

# 1. 必需参数：
#    - project_name
#    - nep_in_header
#    - pot_file
#    - structure_files
#    - gpu_available

# 2. 推荐设置的参数：
#    - accuracy (收敛精度)
#    - pot_number (势函数个数)
#    - train_steps (训练步数)
#    - uncertainty_threshold (不确定性阈值)
#    - stable (初始结构生成参数)

# 3. 可选参数：
#    - job_system (作业提交系统)
#    - 远程计算相关参数
#    - 高级参数

# ============================================================================
# 使用建议
# ============================================================================

# 1. 首次使用：
#    - 设置 shock_run: false，先测试训练流程
#    - 使用较小的 train_steps (如 3000) 快速测试
#    - 使用 mode: "direct" 直接执行

# 2. 正式训练：
#    - 设置 shock_run: true 启用爆速测试
#    - 根据体系调整 accuracy (1-5%)
#    - 根据 GPU 数量调整 pot_number 和 task_per_gpu

# 3. 集群使用：
#    - 配置 job_system 使用调度系统
#    - 设置合适的 gpu_header 和 cpu_header
#    - 调整 check_interval 根据集群负载

# 4. 性能优化：
#    - 增加 gpu_available 使用更多 GPU
#    - 减少 pot_number 降低计算量
#    - 调整 max_candidate 控制候选结构数
