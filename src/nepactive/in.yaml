project_name: "HMX"                                                   # 项目名称，远程提交任务时会命名为该名字
yaml_synchro: true                                                    # 执行每个record.nep步骤时是否重新同步文件参数

replicate_cell: "1 1 1"
accuracy: 1                                                           # 爆速测试精度，据此判断是否收敛，若收敛，程序将停止
ini_engine: "ase"                                                     # 初始动力学数据集获得方法，目前只支持ase
# ini_ase_ensemble_files: ["prep/npt.py"]
python_interpreter: "python" # 执行动力学的时候使用的python解释器     !!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!
ini_frames: 1500                                                      # 初始数据集所需要的结构数
ini_train_steps: 10000                                                # 第一代训练步数
training_ratio: 0.8                                                   # 训练集比例
pot_number: 4                                                         # 势函数个数
pot_inherit: true                                                     # 下一代的训练势函数是否继承上一代的训练结果，否的话会重新训练
train_steps: 5000                                                     # 每一代势函数的训练步数
nep_in_header: "type 4 H C N O"                                    # 可选覆盖；默认会从多个 structure_files 自动识别元素
pot_file: "/home/liuzf/.local/mattersim/pretrained_models/mattersim-v1.0.0-1M.pth" # 用来为数据集打标签的mattersim模型        !!!!!!!!!!!!!!!!!!!!!!!!!!!!
OB_give: 10

gpu_available: [0,1,2,3]       # 可用的 GPU 编号
task_per_gpu: 1                # 每个 GPU 上运行的任务数

max_temp: 10000                                                        # 主动学习过程中允许的最大温度 

# 一定要检查POTCAR的顺序正不正确
# structure_prefix: "/workplace/liuzf/code/nepactive/example/00.HMX/prep" # 结构文件所在的地址前缀，默认为当前目录
structure_files: ["POSCAR", "init/struc.000/structure/POSCAR","prep/final.xyz"] # 用来跑动力学的初始结构的地址?
kpoints_file: "prep/KPOINTS" # 远程提交任务的KPOINTS文件
incar_file: "prep/INCAR"     # 远程提交任务的INCAR文件
potcar_file: "prep/POTCAR"   # 远程提交任务的POTCAR文件

#sampling
sampling:
  method: "relative"                  # 候选筛选方式: "relative" 或 "fps"
  uncertainty_threshold: [0.3,1]      # 主动学习过程中选取为候选的结构的 uncertainty 阈值
  uncertainty_level: 1                 # 主动学习过程中计算相对误差所用到的参数
  uncertainty_mode: "max"             # 主动学习过程中 uncertainty mode: "max" / "mean"
  energy_threshold: 1                  # 主动学习过程中候选结构的能量阈值下限，单位 eV
  needed_frames: 10000                 # 主动学习过程中每代所需要的保存结构数
  max_candidate: 1000                  # 主动学习过程中每代所需要的候选结构数
  max_reference_points: 10000          # 全局 FPS 时用于比较的 reference 上限，超过后先随机截断
  time_step: 0.2                       # 主动学习过程中每代的时间步长
  deviation_backend: auto              # auto / native / gpu / cpu
  enable_molecule_analysis: false      # 是否做分子识别统计，默认关闭以避免额外开销
  molecule_analysis_backend: "ase"    # 分子识别后端，当前仅支持 ase

  init_method: fps                     # 初始 init 数据切分方式
  init_descriptor: soap                # soap / structural / nep
  init_min_dist: 0.0

  dataset_method: fps                  # candidate/train/test 切分方式
  dataset_descriptor: structural       # structural / nep
  dataset_min_dist: 0.0
  dataset_backend: auto                # auto / native / gpu / cpu
  # dataset_nep_file: /path/to/nep.txt # 当 dataset_descriptor: nep 时需要

  general:
    # id: "11-24"
    ensembles: ["nphugo_scr","nvt"]      # 主动学习采样系综，可选: "nphugo_mttk", "nphugo_scr", "nvt", "npt", "msst"
    structure_id: [[0,1],[0,1]]             # 动力学选取的结构文件编号
    pressure: [60,35,10]                    # 模拟的压力列表，单位 GPa
    pperiod: 2000                           # 模拟的压浴参数设置，单位步数 (仅 nphugo/GPUMD 使用)
    temperature: [3000]                     # 模拟的温度列表，单位 K

init:                          # 初始产物结构生成设置
  #structure: "POSCAR"          # 结构文件名
  struc_num: 1                 # 初始结构数量
  pressure: [20,40,60,80]      # 初始数据集的压力列表，单位为GPa
  temperature: [3000]          # 初始数据集的温度列表，单位为K
  steps: 40000                 # 初始数据集的运行步数
  time_step: 0.2               # 时间步长，单位为fs
  dump_freq: 10                # dump频率，单位为步数
  # tau_t: 100                 # BDP 恒温器弛豫时间 (默认 100)
  # tau_p: 2000                # SCR 气压计弛豫时间 (默认 2000)
  # pmode: "iso"               # 压力模式 (默认 "iso")

shock:                         # Hugoniostat 爆速测试设置
  structure: "POSCAR"          # 结构文件名
  pressure_list: [20,25,30,35,40,45,50,55] # 爆速测试的压力列表，单位为GPa
  steps: 100000                # 爆速测试的运行步数
  time_step: 0.4               # 时间步长，单位为fs
  dump_freq: 10                # dump频率，单位为步数
  analyze_range: [0.8,1]       # 爆速测试的分析范围
  pot: "mattersim"                   # 势函数: "nep"(GPUMD, 默认) / "mattersim"
  # tau_t: 100                 # BDP 恒温器弛豫时间 (默认 100)
  # tau_p: 2000                # SCR 气压计弛豫时间 (默认 2000)
  # pmode: "iso"               # 压力模式 (默认 "iso")

# VASP INCAR 参数覆盖（基于 MPStaticSet，默认关闭自旋 ISPIN=1）
# 不配置则使用 MPStaticSet 默认值 + ISPIN=1
incar_settings:
  ALGO: Fast
  EDIFF: 1.0e-06
  ENCUT: 700
  ISMEAR: 0
  ISPIN: 1               # 关闭自旋
  IVDW: 11               # DFT-D3 色散校正
  KSPACING: 0.7           # K点间距，设置后不生成 KPOINTS 文件
  LASPH: false
  LREAL: false
  LWAVE: false
  LCHARG: false
  NELM: 100
  NSW: 0
  PREC: Accurate
  SIGMA: 0.05
  NPAR: 4

#remote
remote:
  dirs: ["."]                                                          # remote 扫描的本地目录列表，默认当前目录
  fp_command: "mpirun -np 96 vasp_std"
  ssh_username: "sch9797@BSCC-T6"
  ssh_hostname: "ssh.cn-zhongwei-1.paracloud.com"
  ssh_port: 22
  ssh_timeout: 20
  remote_root: "/public1/home/sch9797/liu/nep"
  group_numbers: 10
  slurm_header_script:
    - "#!/bin/bash"
    - "#SBATCH --job-name=gpumd"
    - "#SBATCH -p v6_384"
    - "#SBATCH -N 1"
    - "#SBATCH -n 96"
    - "source /public1/soft/modules/module.sh"
    - "module load mpi/oneAPI/2022.1"
    - "export PATH=/public1/home/sch9797/software-sch9797/6.3.0-vtst+opt+sol+wannier:$PATH"


shock_test_interval: 1
shock_test_begin_step: 400000
if_stable_run: true
