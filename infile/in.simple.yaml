project_name: "HMX"                                                   # 项目名称，远程提交任务时会命名为该名字
yaml_synchro: true                                                    # 执行每个record.nep步骤时是否重新同步文件参数
shock_run: false                                                        # 主流程中是否执行 init 与 shock 相关流程
ini_train_steps: 20000                                                # 第一代训练步数；若主目录下有自定义 nep.in，程序仍会用这个值覆盖 generation

# 一定要检查POTCAR的顺序正不正确
gpu_available: [0,1,2,3]
structure_files: ["POSCAR"] # 用来跑动力学的初始结构的地址?

#sampling
sampling:
  general:
    # id: "11-24"
    ensembles: ["npt_scr","nvt"]      # 主动学习采样系综，可选: "nphugo_mttk", "nphugo_scr", "nvt", "npt", "npt_scr", "msst"
    structure_id: [[0],[1]]             # 动力学选取的结构文件编号
    pressure: [60,35,10]                    # 模拟的压力列表，单位 GPa
    pperiod: 2000                           # 模拟的压浴参数设置，单位步数 (nphugo / npt_scr 的 GPUMD 路径使用)
    temperature: [3000]                     # 模拟的温度列表，单位 K

init:                          # 初始产物结构生成设置
  #structure: "POSCAR"          # 结构文件名
  struc_num: 1                 # 初始结构数量
  ensembles: ["npt_scr"]     # 初始 MD 系综；不填时回退到 sampling.general.ensembles
  structure_id: [[0]]      # 初始阶段参与的结构编号；不填时默认使用全部有效 structure_files
  # train_data: ["prep/init_train.xyz"]   # 额外并入初始训练集的已标注 extxyz/xyz 数据
  # test_data: ["prep/init_test.xyz"]     # 额外并入初始测试集的已标注 extxyz/xyz 数据
  pressure: [20,40,60,80]      # 初始数据集的压力列表，单位为GPa
  temperature: [3000]          # 初始数据集的温度列表，单位为K；不填时回退到 sampling.general.temperature
  steps: 40000                 # 初始数据集的运行步数
  time_step: [0.2]             # 初始数据集的时间步长列表，单位为fs；会与 ensemble/temperature/pressure 一起组合
  dump_freq: 10                # dump频率，单位为步数
  # tau_t: 100                 # BDP 恒温器弛豫时间 (默认 100)
  # tau_p: 2000                # SCR 气压计弛豫时间 (默认 2000)
  # pmode: "iso"               # 压力模式 (默认 "iso")
